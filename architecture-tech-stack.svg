<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ERIUnitySimpleServer 架构设计技术栈图</title>
  <desc id="desc">展示客户端、TCP/KCP 双通道、服务端核心模块、协议生成和基础配置之间关系的架构图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe4"/>
      <stop offset="100%" stop-color="#e8f0ea"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#274c77"/>
      <stop offset="100%" stop-color="#3a7d6b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#46606b"/>
    </marker>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #ffffff; }
      .subtitle { font: 400 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #d8e6ea; }
      .box-title { font: 700 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #17313a; }
      .box-subtitle { font: 600 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #244552; }
      .body { font: 400 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #2d4148; }
      .small { font: 400 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #51656c; }
      .label { font: 700 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #34505a; }
      .pill { font: 700 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #fff; }
      .shadow { filter: drop-shadow(0 10px 18px rgba(25, 53, 68, 0.12)); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <rect x="40" y="34" width="1520" height="94" rx="24" fill="url(#header)"/>
  <text x="76" y="83" class="title">ERIUnitySimpleServer 架构设计技术栈图</text>
  <text x="76" y="110" class="subtitle">C# / .NET 6 / TCP / KCP / Protobuf / 房间逻辑 / 帧同步战斗</text>

  <g class="shadow">
    <rect x="70" y="190" width="280" height="210" rx="24" fill="#fff7ed" stroke="#e7b67b" stroke-width="2"/>
    <text x="100" y="235" class="box-title">Unity 客户端</text>
    <text x="100" y="272" class="body">• 登录</text>
    <text x="100" y="304" class="body">• 创建房间 / 加入房间</text>
    <text x="100" y="336" class="body">• 战斗准备 / 心跳</text>
    <text x="100" y="368" class="body">• 输入上传 / 状态校验</text>
  </g>

  <g class="shadow">
    <rect x="470" y="170" width="300" height="120" rx="24" fill="#eef7ff" stroke="#85b7df" stroke-width="2"/>
    <text x="505" y="215" class="box-title">TCP 通道</text>
    <text x="505" y="248" class="body">大厅与业务逻辑</text>
    <text x="505" y="276" class="small">Login / CreateRoom / JoinRoom</text>
  </g>

  <g class="shadow">
    <rect x="470" y="320" width="300" height="120" rx="24" fill="#edf9f1" stroke="#8ac39f" stroke-width="2"/>
    <text x="505" y="365" class="box-title">KCP 通道</text>
    <text x="505" y="398" class="body">实时战斗同步</text>
    <text x="505" y="426" class="small">Connect / Ready / Heartbeat / Frame / Check</text>
  </g>

  <g class="shadow">
    <rect x="900" y="154" width="610" height="592" rx="28" fill="#fcfffd" stroke="#9ab8aa" stroke-width="2"/>
    <text x="936" y="204" class="box-title">服务端核心</text>

    <rect x="936" y="232" width="250" height="130" rx="20" fill="#f4f8ff" stroke="#9eb8e3" stroke-width="2"/>
    <text x="962" y="270" class="box-subtitle">Program.cs</text>
    <text x="962" y="302" class="body">• 初始化管理器</text>
    <text x="962" y="330" class="body">• 启动 TCP 服务</text>

    <rect x="1210" y="232" width="266" height="130" rx="20" fill="#fff6ee" stroke="#dfb181" stroke-width="2"/>
    <text x="1236" y="270" class="box-subtitle">Runtime</text>
    <text x="1236" y="302" class="body">• GameManager</text>
    <text x="1236" y="330" class="body">• NetworkManager / MsgPoolManager</text>

    <rect x="936" y="392" width="250" height="150" rx="20" fill="#eef8f2" stroke="#93c4a4" stroke-width="2"/>
    <text x="962" y="430" class="box-subtitle">NetCore</text>
    <text x="962" y="462" class="body">• TcpServerTransport</text>
    <text x="962" y="490" class="body">• KcpServerTransport</text>
    <text x="962" y="518" class="body">• BufferPool / Packet / RingBuffer</text>

    <rect x="1210" y="392" width="266" height="150" rx="20" fill="#f8f2ff" stroke="#b19edc" stroke-width="2"/>
    <text x="1236" y="430" class="box-subtitle">业务模型</text>
    <text x="1236" y="462" class="body">• GamerInfo</text>
    <text x="1236" y="490" class="body">• RoomInfo</text>
    <text x="1236" y="518" class="body">• 房间 / 玩家 / 连接映射</text>

    <rect x="936" y="572" width="540" height="138" rx="20" fill="#fffdf2" stroke="#d6c173" stroke-width="2"/>
    <text x="962" y="610" class="box-subtitle">战斗循环</text>
    <text x="962" y="642" class="body">• 房间满员后启动 KCP</text>
    <text x="962" y="670" class="body">• 全员 Ready 后开始权威帧广播</text>
    <text x="962" y="698" class="body">• 固定 33ms 推进一帧并处理输入与校验</text>
  </g>

  <g class="shadow">
    <rect x="90" y="498" width="680" height="250" rx="28" fill="#ffffff" stroke="#c9d9d0" stroke-width="2"/>
    <text x="125" y="548" class="box-title">协议与代码生成</text>

    <rect x="126" y="578" width="190" height="112" rx="18" fill="#f4f8ff" stroke="#9eb8e3" stroke-width="2"/>
    <text x="151" y="620" class="box-subtitle">logic.proto</text>
    <text x="151" y="650" class="small">登录 / 建房 / 加房</text>

    <rect x="336" y="578" width="190" height="112" rx="18" fill="#eef8f2" stroke="#93c4a4" stroke-width="2"/>
    <text x="361" y="620" class="box-subtitle">battle.proto</text>
    <text x="361" y="650" class="small">准备 / 帧同步 / 校验</text>

    <rect x="546" y="578" width="190" height="112" rx="18" fill="#fff6ee" stroke="#dfb181" stroke-width="2"/>
    <text x="571" y="620" class="box-subtitle">ProtoGen/Gen</text>
    <text x="571" y="650" class="small">生成 pb 命名空间消息类</text>
  </g>

  <g class="shadow">
    <rect x="90" y="790" width="1420" height="130" rx="26" fill="#f9fbfc" stroke="#b6c8cf" stroke-width="2"/>
    <text x="126" y="838" class="box-title">配置与运行参数</text>
    <rect x="126" y="858" width="170" height="36" rx="18" fill="#274c77"/>
    <text x="165" y="882" class="pill">127.0.0.1</text>
    <rect x="316" y="858" width="150" height="36" rx="18" fill="#3a7d6b"/>
    <text x="359" y="882" class="pill">TCP 10085</text>
    <rect x="486" y="858" width="150" height="36" rx="18" fill="#b86f52"/>
    <text x="529" y="882" class="pill">KCP 10086</text>
    <rect x="656" y="858" width="170" height="36" rx="18" fill="#7d6aa7"/>
    <text x="705" y="882" class="pill">房间人数 2</text>
    <rect x="846" y="858" width="190" height="36" rx="18" fill="#9a8a33"/>
    <text x="896" y="882" class="pill">帧间隔 33ms</text>
    <rect x="1056" y="858" width="230" height="36" rx="18" fill="#486b7a"/>
    <text x="1115" y="882" class="pill">最大帧数 10000</text>
  </g>

  <line x1="350" y1="250" x2="470" y2="230" stroke="#46606b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="350" y1="342" x2="470" y2="380" stroke="#46606b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="770" y1="230" x2="900" y2="250" stroke="#46606b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="770" y1="380" x2="900" y2="460" stroke="#46606b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="430" y1="498" x2="430" y2="450" stroke="#46606b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="736" y1="634" x2="900" y2="634" stroke="#46606b" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="382" y="212" class="label">逻辑请求</text>
  <text x="382" y="392" class="label">实时请求</text>
  <text x="790" y="215" class="label">业务入口</text>
  <text x="793" y="438" class="label">传输接入</text>
  <text x="448" y="474" class="label">消息定义</text>
  <text x="790" y="620" class="label">帧同步驱动</text>
</svg>
